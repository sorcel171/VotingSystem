<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Vote System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a252f; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #3498db; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #2980b9; }
        .error-msg { color: #e74c3c; margin-top: 15px; font-size: 14px; display: none; }
        .footer-link { margin-top: 20px; font-size: 14px; color: #666; }
        .footer-link a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Sign In to Vote</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn-login">Login</button>
    </form>
    <div id="errorBox" class="error-msg"></div>
    
    <div class="footer-link">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Clear previous errors
        errorBox.style.display = 'none';
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // 1. Save user session data
                localStorage.setItem('user', JSON.stringify(data.user));

                // 2. Role-based Redirection
                if (data.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                // Show error message from server
                errorBox.textContent = data.error || "Login failed";
                errorBox.style.display = 'block';
            }
        } catch (err) {
            console.error("Login Error:", err);
            errorBox.textContent = "Server connection failed. Try again later.";
            errorBox.style.display = 'block';
        }
    });

    // Check if user is already logged in
    window.onload = () => {
        const existingUser = localStorage.getItem('user');
        if (existingUser) {
            const parsed = JSON.parse(existingUser);
            if (parsed.role === 'admin') window.location.href = 'admin.html';
            else window.location.href = 'dashboard.html';
        }
    };
</script>

</body>
</html>
